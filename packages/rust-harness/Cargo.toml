[package]
name = "sorobench"
version = "0.1.0"
edition = "2021"
description = "Rust benchmarking harness for Soroban smart contracts"
license = "MIT"

[dependencies]
soroban-sdk = { version = "22.0.0", features = ["testutils"] }
soroban-env-host = { version = "22.0.0", features = ["testutils"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[lib]
crate-type = ["lib"]
