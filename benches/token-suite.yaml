# benches/token-suite.yaml
name: Token Contract Full Suite
contract: token
wasm: ./target/wasm32-unknown-unknown/release/token.wasm

setup:
  accounts:
    - id: alice
      initial_balance: 1000000000
    - id: bob
      initial_balance: 0

benchmarks:
  - name: transfer small
    function: transfer
    args:
      from: alice
      to: bob
      amount: 1000

  - name: transfer large
    function: transfer
    args:
      from: alice
      to: bob
      amount: 1000000000

  - name: balance cold
    function: balance
    args:
      account: bob

  - name: balance warm
    function: balance
    args:
      account: alice

  - name: mint — parameterized
    function: mint
    parameterize:
      amount: [1000, 100000, 10000000, 1000000000]
